# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: certifyforge
services:
    certifyforge-agents:
        project: src/certifyforge_agents
        host: azure.ai.agent
        language: python
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4.1-mini
                    version: "2025-04-14"
                  name: gpt-4.1-mini
                  sku:
                    capacity: 1000
                    name: GlobalStandard
                - model:
                    format: OpenAI
                    name: text-embedding-3-small
                    version: "1"
                  name: text-embedding-3-small
                  sku:
                    capacity: 1000
                    name: GlobalStandard
infra:
    provider: bicep
    path: ./infra
